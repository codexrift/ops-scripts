---
- name: Deploy Linux profile snippets
  hosts: linux
  gather_facts: false

  vars:
    profile_src_dir: "{{ playbook_dir }}/../../linux/profile/.config/"

  tasks:
    - name: Resolve remote home directory
      ansible.builtin.command: sh -lc 'printf %s "$HOME"'
      register: profile_home
      changed_when: false

    - name: Ensure destination directory exists
      ansible.builtin.file:
        path: "{{ profile_home.stdout }}/.config"
        state: directory
        mode: "0700"

    - name: Copy profile content into destination
      ansible.builtin.copy:
        src: "{{ profile_src_dir }}"
        dest: "{{ profile_home.stdout }}/.config/"
        mode: preserve

    - name: Ensure ~/.bashrc sources ~/.config/shell/*.sh
      ansible.builtin.lineinfile:
        path: "{{ profile_home.stdout }}/.bashrc"
        create: true
        insertafter: EOF
        line: 'for f in "$HOME/.config/shell/"*.sh; do [ -r "$f" ] && . "$f"; done'
