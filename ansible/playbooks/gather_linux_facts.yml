---
- name: Gather all Linux facts
  hosts: linux
  gather_facts: false

  tasks:
    - name: Ensure local facts output folder exists
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../facts"
        state: directory
        mode: "0755"
      delegate_to: localhost
      become: false
      run_once: true

    - name: Gather facts
      ansible.builtin.setup:

    - name: Write facts JSON to local folder
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../facts/{{ inventory_hostname }}.json"
        content: "{{ ansible_facts | to_nice_json }}"
        mode: "0644"
      delegate_to: localhost
      become: false
