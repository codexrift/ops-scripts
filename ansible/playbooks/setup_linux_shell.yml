---
- name: Setup Linux shell
  hosts: linux
  gather_facts: false

  roles:
    - linux_profile

  tasks:
    - name: Check curl
      ansible.builtin.command: sh -lc 'command -v curl'
      register: curl_check
      changed_when: false
      failed_when: false

    - name: Require curl
      ansible.builtin.fail:
        msg: "curl is required. Run playbook setup_linux_baseline.yml first."
      when: curl_check.rc != 0

    - name: Check starship
      ansible.builtin.command: sh -lc 'command -v starship'
      register: starship_check
      changed_when: false
      failed_when: false

    - name: Install starship
      ansible.builtin.shell: |
        curl -fsSL https://starship.rs/install.sh | sh -s -- -y
      args:
        executable: /bin/sh
      when: starship_check.rc != 0

    - name: Ensure ~/.config exists
      ansible.builtin.file:
        path: ~/.config
        state: directory
        mode: "0755"

    - name: Configure starship to show full path (managed)
      ansible.builtin.copy:
        dest: ~/.config/starship.ops-scripts.toml
        mode: "0644"
        content: |
          # Managed by ops-scripts (Ansible)
          # Goal: show the full current path in the prompt.
          [directory]
          truncation_length = 0
          truncate_to_repo = false

    - name: Ensure bashrc points Starship at managed config
      ansible.builtin.lineinfile:
        path: ~/.bashrc
        create: true
        insertbefore: '^eval "\$\(starship init bash\)"$'
        line: 'export STARSHIP_CONFIG="$HOME/.config/starship.ops-scripts.toml"'

    - name: Ensure bashrc initializes starship
      ansible.builtin.lineinfile:
        path: ~/.bashrc
        create: true
        insertafter: EOF
        line: 'eval "$(starship init bash)"'

    - name: Reload bashrc (non-persistent)
      ansible.builtin.shell: bash -lc 'source ~/.bashrc'
      changed_when: false

    - name: "Reminder: reload your current shell"
      ansible.builtin.debug:
        msg: 'To apply changes in your current terminal, run: source ~/.bashrc'
