---
- name: Setup Linux shell
  hosts: linux
  gather_facts: false

  tasks:
    - name: Ensure shell dir exists
      ansible.builtin.file:
        path: ~/.config/shell
        state: directory
        mode: "0700"

    - name: Copy shell snippets
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/shell/"
        dest: ~/.config/shell/
        mode: preserve

    - name: Remove stale shell files
      vars:
        managed_shell_files: "{{ lookup('ansible.builtin.fileglob', playbook_dir ~ '/../files/shell/*', wantlist=True) | map('basename') | list }}"
      block:
        - name: Find existing shell files
          ansible.builtin.find:
            paths: ~/.config/shell
            file_type: file
          register: shell_existing

        - name: Delete files not in repo
          ansible.builtin.file:
            path: "{{ item.path }}"
            state: absent
          loop: "{{ shell_existing.files }}"
          when: (item.path | basename) not in managed_shell_files

    - name: Ensure bashrc sources shell snippets
      ansible.builtin.lineinfile:
        path: ~/.bashrc
        create: true
        insertafter: EOF
        line: 'for f in "$HOME/.config/shell/"*.sh; do [ -r "$f" ] && . "$f"; done'

    - name: Check curl
      ansible.builtin.command: sh -lc 'command -v curl'
      register: curl_check
      changed_when: false
      failed_when: false

    - name: Require curl
      ansible.builtin.fail:
        msg: "curl is required. Run playbook setup_linux_baseline_apt.yml first."
      when: curl_check.rc != 0

    - name: Check starship
      ansible.builtin.command: sh -lc 'command -v starship'
      register: starship_check
      changed_when: false
      failed_when: false

    - name: Install starship
      ansible.builtin.shell: |
        curl -fsSL https://starship.rs/install.sh | sh -s -- -y
      args:
        executable: /bin/sh
      when: starship_check.rc != 0

    - name: Ensure ~/.config exists
      ansible.builtin.file:
        path: ~/.config
        state: directory
        mode: "0755"

    - name: Configure starship to show full path (managed)
      ansible.builtin.copy:
        dest: ~/.config/starship.ops-scripts.toml
        mode: "0644"
        content: |
          # Managed by ops-scripts (Ansible)
          # Goal: show the full current path in the prompt.
          [directory]
          truncation_length = 0
          truncate_to_repo = false

    - name: Ensure bashrc points Starship at managed config
      ansible.builtin.lineinfile:
        path: ~/.bashrc
        create: true
        insertbefore: '^eval "\$\(starship init bash\)"$'
        line: 'export STARSHIP_CONFIG="$HOME/.config/starship.ops-scripts.toml"'

    - name: Ensure bashrc initializes starship
      ansible.builtin.lineinfile:
        path: ~/.bashrc
        create: true
        insertafter: EOF
        line: 'eval "$(starship init bash)"'

    - name: Reload bashrc (non-persistent)
      ansible.builtin.shell: bash -lc 'source ~/.bashrc'
      changed_when: false

    - name: "Reminder: reload your current shell"
      ansible.builtin.debug:
        msg: 'To apply changes in your current terminal, run: source ~/.bashrc'
