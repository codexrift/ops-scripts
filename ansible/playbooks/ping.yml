---
- name: Ping Ubuntu hosts
  hosts: linux
  gather_facts: false

  pre_tasks:
    - name: Check if Python is available
      ansible.builtin.raw: "command -v python3 || command -v python"
      register: python_check
      changed_when: false
      failed_when: false

    - name: Install Python if missing (Ubuntu/Debian via apt-get)
      ansible.builtin.raw: |
        set -e
        if command -v python3 >/dev/null 2>&1 || command -v python >/dev/null 2>&1; then
          exit 0
        fi
        if command -v apt-get >/dev/null 2>&1; then
          apt-get update -y
          apt-get install -y python3 python3-apt
          exit 0
        fi
        echo "Python missing and apt-get not available." >&2
        exit 1
      changed_when: true
      become: true
      when: python_check.rc != 0

    - name: Gather minimal facts
      ansible.builtin.setup:
        gather_subset:
          - min

    - name: Assert Ubuntu
      ansible.builtin.assert:
        that:
          - ansible_facts.distribution == "Ubuntu"
        fail_msg: "This repo targets Ubuntu only. Detected: {{ ansible_facts.distribution | default('unknown') }}"

  tasks:
    - name: Ping
      ansible.builtin.ping:
