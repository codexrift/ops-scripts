---
- name: Setup Linux baseline (APT packages)
  hosts: linux
  gather_facts: true
  become: true

  tasks:
    - name: Upgrade packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - build-essential
          - ca-certificates
          - curl
          - fzf
          - git
          - htop
          - iftop
          - iotop
          - jq
          - lsof
          - ncdu
          - net-tools
          - ripgrep
          - sysstat
          - tree
          - unattended-upgrades
          - unzip
          - vim
          - wget
          - zip
        state: present

    - name: Enable periodic APT update + unattended upgrade
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        mode: "0644"
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";

    - name: Configure unattended-upgrades for security updates only
      vars:
        distro_id: "{{ ansible_facts.distribution | default('') }}"
        distro_codename: "{{ ansible_facts.lsb.codename | default(ansible_facts.distribution_release | default('')) }}"
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        mode: "0644"
        content: |
          Unattended-Upgrade::Origins-Pattern {
                  "origin={{ distro_id }},codename={{ distro_codename }},label={{ distro_id }}-Security";
                  "origin={{ distro_id }},codename={{ distro_codename }}-security,label={{ distro_id }}-Security";
          };

          Unattended-Upgrade::Package-Blacklist {
          };

          Unattended-Upgrade::Automatic-Reboot "false";
          Unattended-Upgrade::Mail "";
          Unattended-Upgrade::Remove-Unused-Dependencies "true";

    - name: Enable sysstat collection
      ansible.builtin.lineinfile:
        path: /etc/default/sysstat
        create: true
        regexp: '^ENABLED='
        line: 'ENABLED="true"'

    - name: Restart sysstat service (if present)
      ansible.builtin.service:
        name: sysstat
        state: restarted
      failed_when: false

    - name: Clean apt cache
      ansible.builtin.apt:
        autoremove: true
        autoclean: true

    - name: Apt cleanup (clean)
      ansible.builtin.command: apt-get clean
      changed_when: false
