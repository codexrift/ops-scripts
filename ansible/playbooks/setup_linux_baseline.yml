---
- name: Setup Linux baseline
  hosts: linux
  gather_facts: false
  become: true

  tasks:
    - name: Upgrade packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist

    - name: Install base packages
      ansible.builtin.apt:
        name:
          - build-essential
          - ca-certificates
          - curl
          - git
          - htop
          - jq
          - net-tools
          - ripgrep
          - tree
          - unattended-upgrades
          - unzip
          - vim
          - wget
          - zip
        state: present

    - name: Enable periodic APT update + unattended upgrade
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        mode: "0644"
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Unattended-Upgrade "1";

    - name: Configure unattended-upgrades for security updates only
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        mode: "0644"
        content: |
          Unattended-Upgrade::Origins-Pattern {
                  "origin=${distro_id},codename=${distro_codename},label=${distro_id}-Security";
                  "origin=${distro_id},codename=${distro_codename}-security,label=${distro_id}-Security";
          };

          Unattended-Upgrade::Package-Blacklist {
          };

          Unattended-Upgrade::Automatic-Reboot "false";
          Unattended-Upgrade::Mail "";
          Unattended-Upgrade::Remove-Unused-Dependencies "true";

    - name: Clean apt cache
      ansible.builtin.apt:
        autoremove: true
        autoclean: true
